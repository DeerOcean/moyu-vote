<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>摸魚 mascot 二選一比稿</title>
<style>
  :root{--bg:#f5f2ea;--card:#fffdf8;--ink:#2b2b2b;--muted:#8a8275;--line:#e3ddd0;--accent:#c98a3a;--win:#3a9d6b}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",system-ui,sans-serif;background:var(--bg);color:var(--ink);display:flex;flex-direction:column}
  header{padding:10px 14px;background:var(--card);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
  header h1{font-size:15px;margin:0;flex:1}
  .count{font-size:12px;color:var(--muted)}
  .q{text-align:center;font-size:15px;color:var(--muted);padding:10px 12px 4px}
  main{flex:1;display:flex;flex-direction:column;gap:12px;padding:12px;max-width:880px;margin:0 auto;width:100%}
  .pair{display:flex;gap:12px;flex:1}
  @media(max-width:560px){.pair{flex-direction:column}}
  .pick{flex:1;background:var(--card);border:2px solid var(--line);border-radius:16px;display:flex;flex-direction:column;
    align-items:center;justify-content:center;padding:10px;cursor:pointer;transition:transform .08s,border-color .12s;min-height:180px;position:relative}
  .pick:active{transform:scale(.97);border-color:var(--accent)}
  .pick img{max-width:100%;max-height:46vh;object-fit:contain;pointer-events:none}
  @media(max-width:560px){.pick img{max-height:30vh}}
  .pickbtn{margin-top:8px;font-size:14px;color:var(--accent);font-weight:600}
  .controls{display:flex;gap:10px;justify-content:center;padding-bottom:6px}
  .btn{padding:9px 18px;border:1px solid var(--line);border-radius:24px;background:var(--card);font-size:14px;cursor:pointer;font-family:inherit}
  .btn:active{background:#efe9dd}
  footer{padding:8px 14px;background:var(--card);border-top:1px solid var(--line);display:flex;gap:10px;align-items:center;font-size:12px;color:var(--muted)}
  footer a,footer .link{color:var(--accent);cursor:pointer;text-decoration:underline}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;padding:20px;z-index:20}
  .modal .box{background:var(--card);border-radius:16px;padding:20px;max-width:420px;width:100%;max-height:86vh;overflow:auto}
  .modal h2{margin:0 0 8px;font-size:17px}
  .modal p{font-size:13px;color:var(--muted);margin:6px 0 14px}
  .modal input{width:100%;padding:10px;border:1px solid var(--line);border-radius:8px;font-size:16px;font-family:inherit}
  .modal .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);width:100%;margin-top:14px;padding:12px}
  .rank{list-style:none;margin:0;padding:0}
  .rank li{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--line)}
  .rank img{width:54px;height:54px;object-fit:contain;background:#fff;border-radius:8px;border:1px solid var(--line)}
  .rank .meta{flex:1;font-size:12px}
  .rank .elo{font-weight:700;font-variant-numeric:tabular-nums}
  .rank .sub{color:var(--muted);font-size:11px}
  .badge{font-size:10px;padding:1px 7px;border-radius:10px;background:#efe6d6;color:#9a7430}
</style>
</head>
<body>
<header>
  <h1>摸魚 mascot 二選一</h1>
  <span class="badge" id="mode">本機</span>
  <span class="count" id="count">0 票</span>
</header>
<div class="q" id="q">哪一隻你比較想養 / 想摸頭？</div>
<main>
  <div class="pair">
    <div class="pick" id="pickL"><img id="imgL" alt=""><div class="pickbtn">選這隻</div></div>
    <div class="pick" id="pickR"><img id="imgR" alt=""><div class="pickbtn">選這隻</div></div>
  </div>
  <div class="controls">
    <button class="btn" id="tie">都喜歡 / 平手</button>
    <button class="btn" id="skip">兩隻都不行 ⏭</button>
  </div>
</main>
<footer>
  <span id="who"></span>
  <span style="flex:1"></span>
  <span class="link" id="changeName">改名</span>
  <span class="link" id="showResults">看排行</span>
</footer>

<div class="modal" id="nameModal" style="display:none">
  <div class="box">
    <h2>歡迎幫忙選摸魚吉祥物 🐟</h2>
    <p>每次出兩隻，點你比較喜歡的那隻就好（想養／想摸頭的直覺）。先留個暱稱，方便我知道是誰投的。</p>
    <input id="nameInput" placeholder="你的暱稱" maxlength="20">
    <button class="btn primary" id="nameOk">開始選</button>
  </div>
</div>

<div class="modal" id="resultModal" style="display:none">
  <div class="box">
    <h2>目前排行 <span class="count" id="rCount"></span></h2>
    <p id="rNote"></p>
    <ol class="rank" id="rankList"></ol>
    <button class="btn" id="copyResults" style="margin-top:12px">複製排行文字</button>
    <button class="btn primary" id="closeResults">繼續投票</button>
  </div>
</div>

otter__F_seaotter__wetblack_logfloat.jpg", "label": "F_seaotter__wetblack_logfloat"}, {"id": "pitch__sp_egret_sleep", "group": "pitch", "file": "imgs/pitch__sp_egret_sleep.jpg", "label": "sp_egret_sleep"}, {"id": "pitch__sp_egret_stand", "group": "pitch", "file": "imgs/pitch__sp_egret_stand.jpg", "label": "sp_egret_stand"}, {"id": "pitch__sp_otter_seapalette", "group": "pitch", "file": "imgs/pitch__sp_otter_seapalette.jpg", "label": "sp_otter_seapalette"}, {"id": "pitch__sp_shoebill", "group": "pitch", "file": "imgs/pitch__sp_shoebill.jpg", "label": "sp_shoebill"}, {"id": "v17__otter_v17_logfloat", "group": "v17", "file": "imgs/v17__otter_v17_logfloat.jpg", "label": "otter_v17_logfloat"}, {"id": "v17__otter_v17_rodnap", "group": "v17", "file": "imgs/v17__otter_v17_rodnap.jpg", "label": "otter_v17_rodnap"}, {"id": "v17__otter_v17_soak", "group": "v17", "file": "imgs/v17__otter_v17_soak.jpg", "label": "otter_v17_soak"}, {"id": "v17__otter_v17_trophyflop", "group": "v17", "file": "imgs/v17__otter_v17_trophyflop.jpg", "label": "otter_v17_trophyflop"}];
const byId = Object.fromEntries(ITEMS.map(x=>[x.id,x]));
const params = new URLSearchParams(location.search);
const API = params.get("api") || (window.VOTE_API || null);   // central store base URL, else local
const LKEY = "moyu_pairwise_v1";
let voter = localStorage.getItem("moyu_voter") || "";
let localVotes = JSON.parse(localStorage.getItem(LKEY) || "[]");
document.getElementById("mode").textContent = API ? "連線" : "本機";

function saveLocal(){ localStorage.setItem(LKEY, JSON.stringify(localVotes)); }
function myCount(){ return localVotes.length; }
function refreshCount(){ document.getElementById("count").textContent = myCount()+" 票"; document.getElementById("who").textContent = voter?("嗨 "+voter):""; }

async function sendVote(v){
  localVotes.push(v); saveLocal(); refreshCount();
  if(API){ try{ await fetch(API, {method:"POST", headers:{"Content-Type":"text/plain;charset=utf-8"}, body:JSON.stringify(v)}); }catch(e){} }
}

// pairing: prefer items with fewer local appearances, avoid immediate repeat
const seenCount = {}; ITEMS.forEach(x=>seenCount[x.id]=0);
localVotes.forEach(v=>{ (v.pair||[]).forEach(id=>{ if(id in seenCount) seenCount[id]++; }); });
let lastPair = [];
function pickItem(exclude){
  const pool = ITEMS.filter(x=>!exclude.includes(x.id));
  const min = Math.min(...pool.map(x=>seenCount[x.id]));
  const cand = pool.filter(x=>seenCount[x.id]<=min+1);
  return cand[Math.floor(Math.random()*cand.length)];
}
let curL, curR;
function nextPair(){
  curL = pickItem(lastPair);
  curR = pickItem([curL.id, ...lastPair]);
  lastPair = [curL.id, curR.id];
  document.getElementById("imgL").src = curL.file;
  document.getElementById("imgR").src = curR.file;
}
function record(winner, loser, tie){
  const v = {voter, ts:Date.now(), pair:[curL.id,curR.id]};
  if(tie){ v.tie=true; } else { v.winner=winner; v.loser=loser; }
  v.pair.forEach(id=>seenCount[id]++);
  sendVote(v); nextPair();
}
document.getElementById("pickL").onclick=()=>record(curL.id,curR.id,false);
document.getElementById("pickR").onclick=()=>record(curR.id,curL.id,false);
document.getElementById("tie").onclick=()=>record(null,null,true);
document.getElementById("skip").onclick=()=>{ lastPair=[]; nextPair(); };

// name modal
function askName(){ document.getElementById("nameInput").value=voter; document.getElementById("nameModal").style.display="flex"; }
document.getElementById("nameOk").onclick=()=>{
  const n=document.getElementById("nameInput").value.trim()||"匿名"+Math.floor(Math.random()*1000);
  voter=n; localStorage.setItem("moyu_voter",n); document.getElementById("nameModal").style.display="none"; refreshCount();
};
document.getElementById("changeName").onclick=askName;

// results: Elo over all votes (local + remote if available)
async function allVotes(){
  let votes = localVotes.slice();
  if(API){ try{ const r=await fetch(API); const d=await r.json(); if(Array.isArray(d)) votes=d; }catch(e){} }
  return votes;
}
function computeElo(votes){
  const R={}; ITEMS.forEach(x=>R[x.id]=1000); const games={}; ITEMS.forEach(x=>games[x.id]=0);
  votes.forEach(v=>{
    if(v.tie && v.pair){ const[a,b]=v.pair; if(!(a in R)||!(b in R))return; upd(a,b,0.5); upd(b,a,0.5); games[a]++;games[b]++; return; }
    if(v.winner && v.loser && (v.winner in R) && (v.loser in R)){ upd(v.winner,v.loser,1); upd(v.loser,v.winner,0); games[v.winner]++;games[v.loser]++; }
  });
  function upd(p,o,s){ const ea=1/(1+Math.pow(10,(R[o]-R[p])/400)); R[p]=R[p]+24*(s-ea); }
  return ITEMS.map(x=>({...x,elo:Math.round(R[x.id]),games:games[x.id]})).sort((a,b)=>b.elo-a.elo);
}
async function showResults(){
  const votes=await allVotes(); const rank=computeElo(votes).filter(x=>x.games>0);
  document.getElementById("rCount").textContent="("+votes.length+" 票)";
  document.getElementById("rNote").textContent = API? "已彙整所有人的票（Elo 排序）。" : "目前只統計你這台裝置的票。";
  const ol=document.getElementById("rankList"); ol.innerHTML="";
  rank.slice(0,40).forEach((x,i)=>{ const li=document.createElement("li");
    li.innerHTML='<b style="width:22px;text-align:right">'+(i+1)+'</b><img src="'+x.file+'"><div class="meta"><div>'+x.label+'</div><div class="sub">'+x.group+' · '+x.games+' 場</div></div><div class="elo">'+x.elo+'</div>';
    ol.appendChild(li); });
  window._rankCache=rank;
  document.getElementById("resultModal").style.display="flex";
}
document.getElementById("showResults").onclick=showResults;
document.getElementById("closeResults").onclick=()=>document.getElementById("resultModal").style.display="none";
document.getElementById("copyResults").onclick=()=>{
  const t=(window._rankCache||[]).filter(x=>x.games>0).map((x,i)=>(i+1)+". "+x.label+" ("+x.elo+", "+x.games+"場)").join("\n");
  navigator.clipboard.writeText(t).then(()=>alert("已複製排行"));
};

// boot
refreshCount(); nextPair();
if(!voter) askName();
</script>
